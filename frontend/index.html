<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATS Resume Scanner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:#071330;
    color:white;
    display:flex;
    flex-direction:column;
}

.header{
    text-align:center;
    padding-top:35px;
}

.header h1{
    font-size:55px;
    font-weight:800;
    letter-spacing:1px;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.content{
    max-width:700px;
}

.content h2{
    font-size:42px;
    font-weight:700;
    margin-bottom:15px;
}

.content p{
    font-size:18px;
    color:#B8C1D1;
    line-height:1.7;
    margin-bottom:30px;
}

.btn{
    padding:14px 32px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        90deg,
        #6366F1,
        #7C3AED
    );
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

@media(max-width:768px){

    .header h1{
        font-size:42px;
    }

    .content h2{
        font-size:30px;
    }

    .content p{
        font-size:16px;
    }
}

</style>

</head>

<body>

<div class="header">
    <h1>ATS Resume Scanner</h1>
</div>

<div class="main">

    <div class="content">

        <h2>Discover Where Your Skills Belong</h2>

        <p>
            Analyze your resume with AI and identify
            the roles that best match your skills,
            experience, and career goals.
        </p>

        <button class="btn" onclick="location.href='upload.html'">
            Get Started →
        </button>
	<div id="result"></div>

    </div>

</div>

</body>
</html>
