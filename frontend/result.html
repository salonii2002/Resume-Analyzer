<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analysis Result</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#071330;
    color:white;
    min-height:100vh;
    padding:30px;
}

/* Main Container */

.result-container{
    max-width:1200px;
    margin:auto;
}

.result-container h1{
    text-align:center;
    font-size:50px;
    font-weight:800;
    margin-bottom:30px;
}

/* ATS Score Card */

.score-card{
    background:white;
    color:#071330;
    padding:35px;
    border-radius:20px;
    text-align:center;
    margin-bottom:30px;
}

.score-card h3{
    font-size:22px;
}

.score-card h2{
    color:#2563eb;
    font-size:70px;
    margin:15px 0;
}

#atsRemark{
    color:#22c55e;
    font-size:18px;
    font-weight:bold;
}

.progress{
    width:100%;
    height:18px;
    background:#374151;
    border-radius:50px;
    overflow:hidden;
    margin-top:20px;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        #6366F1,
        #7C3AED
    );
}

/* Dashboard */

.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    color:#071330;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    font-size:22px;
    margin-bottom:10px;
}

.card p{
    color:#2563eb;
    font-size:32px;
    font-weight:bold;
}
#matchScore{
    color:#22c55e;
}

/* Sections */

.section-space{
    margin-top:25px;
}

.suggestion-card{
    background:white;
    color:#071330;
    padding:25px;
    border-radius:15px;
    margin-top:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}
.suggestion-card h2{
    color:#071330;
    margin-bottom:20px;
}
/* Lists */

.suggestion-card ul{
    list-style-type:disc;
    padding-left:35px;
}

.suggestion-card li{
    margin-bottom:12px;
    line-height:1.8;
}

/* Skills Tags */

#skillsList{
    list-style:none;
    padding-left:0;
}

#skillsList li{
    display:inline-block;
    background:#dbeafe;
    color:#1d4ed8;
    padding:8px 15px;
    border-radius:20px;
    margin:5px;
    font-size:14px;
}

/* Strength & Weakness */

.analysis-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:25px;
}

/* Download Button */

.download-section{
    text-align:center;
    margin-top:40px;
}

.download-btn{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        90deg,
        #2563eb,
        #7c3aed
    );
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.download-btn:hover{
    transform:translateY(-3px);
}

/* Mobile */

@media(max-width:768px){

    .dashboard{
        grid-template-columns:1fr;
    }

    .analysis-grid{
        grid-template-columns:1fr;
    }

    .score-card h2{
        font-size:50px;
    }

    .result-container h1{
        font-size:35px;
    }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="result-container">

    <h1>Resume Analysis Result</h1>

    <div class="score-card">
	
        <h3>ATS Resume Score</h3>

        <h2 id="scoreText">0%</h2>

        <p id="atsRemark"></p>

        <div class="progress">
            <div class="progress-fill" id="progressFill"></div>
        </div>

    </div>
	


    <div class="dashboard">

    <div class="card">
        <h3>🎯 Best Domain</h3>
        <p id="bestDomain">Loading...</p>
    </div>

    <div class="card">
        <h3>📊 Job Match Score</h3>
        <p id="matchScore">0%</p>
    </div>

    <div class="card">
        <h3>🛠 Skills Found</h3>
        <p id="skillCount">0</p>
    </div>

    </div>


<div class="suggestion-card">
    <h2>❌ Missing Skills</h2>
    <ul id="missingSkillsList"></ul>
</div>

<div class="suggestion-card section-space">
    <h2>✅ Matched Skills</h2>
    <ul id="matchedSkillsList"></ul>
</div>

<div class="suggestion-card section-space">
    <h2>🛠 Detected Skills</h2>
    <ul id="skillsList"></ul>
</div>

<div class="suggestion-card section-space">
    <h2>💼 Recommended Jobs</h2>
    <ul id="jobsList"></ul>
</div>

    <div class="suggestion-card">

        <h2>💡 Suggestions</h2>

        <ul id="suggestionsList"></ul>

    </div>


    <div class="analysis-grid">

    <div class="suggestion-card">
        <h2>💪 Strengths</h2>
        <ul id="strengthsList"></ul>
    </div>

    <div class="suggestion-card">
        <h2>⚠️ Improvements</h2>
        <ul id="weaknessesList"></ul>
    </div>

</div>

<hr style="margin:25px 0;">

<div class="download-section">

    <button class="download-btn" onclick="downloadPDF()">
    📥 Export Resume Analysis
</button>

</div>

</div>

<script>
const result = JSON.parse(localStorage.getItem("result"));
console.log(result);
console.log(result.foundSkills);
async function downloadPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Resume Analysis Report", 20, 20);

    doc.setFontSize(12);

    doc.text(
        "ATS Score: " + result.atsScore + "%",
        20,
        40
    );

    doc.text(
        "Best Domain: " + result.bestDomain,
        20,
        50
    );

    doc.text(
        "Skills Found: " + result.foundSkills.length,
        20,
        60
    );

    let y = 80;

    doc.text("Detected Skills:",20,y);

    y += 10;

    result.foundSkills.forEach(skill => {

        doc.text("- " + skill,25,y);

        y += 8;

    });

    y += 10;

    doc.text("Recommended Jobs:",20,y);

    y += 10;

    result.jobs.forEach(job => {

        doc.text("- " + job,25,y);

        y += 8;

    });

    doc.save("Resume_Report.pdf");

}

if(result){

    document.getElementById("scoreText").innerText =
    result.atsScore + "%";

    document.getElementById("progressFill").style.width =
    result.atsScore + "%";

    let remark = "";

    if(result.atsScore >= 80){
        remark = "Excellent Resume";
    }
    else if(result.atsScore >= 60){
        remark = "Good Resume";
    }
    else{
        remark = "Needs Improvement";
    }

    document.getElementById("atsRemark").innerText =
    remark;

    document.getElementById("bestDomain").innerText =
    result.bestDomain || "Not Found";
    
    document.getElementById("skillCount").innerText =
    result.foundSkills ? result.foundSkills.length : 0;

    document.getElementById("matchScore").innerText =
    (result.matchScore || 0) + "%";

	const skillsList =
	document.getElementById("skillsList");

	skillsList.innerHTML = "";

if(result.foundSkills){

    result.foundSkills.forEach(skill => {

        skillsList.innerHTML += `<li>${skill}</li>`;

    });

}const jobsList =
document.getElementById("jobsList");

jobsList.innerHTML = "";

if(result.jobs){
    result.jobs.forEach(job => {
        jobsList.innerHTML += `<li>${job}</li>`;
    });
}

const suggestionsList =
document.getElementById("suggestionsList");

suggestionsList.innerHTML = "";

if(result.suggestions){
    result.suggestions.forEach(item => {
        suggestionsList.innerHTML += `<li>${item}</li>`;
    });
}

const strengthsList =
document.getElementById("strengthsList");

strengthsList.innerHTML = "";

if(result.strengths){
    result.strengths.forEach(item => {
        strengthsList.innerHTML += `<li>${item}</li>`;
    });
}

const weaknessesList =
document.getElementById("weaknessesList");

weaknessesList.innerHTML = "";

if(result.weaknesses){
    result.weaknesses.forEach(item => {
        weaknessesList.innerHTML += `<li>${item}</li>`;
    });
}

const matchedSkillsList =
document.getElementById("matchedSkillsList");

	matchedSkillsList.innerHTML = "";

if(result.matchedSkills &&
   result.matchedSkills.length > 0){

    result.matchedSkills.forEach(skill => {

        matchedSkillsList.innerHTML +=
        `<li>${skill}</li>`;

    });

}
else{

    matchedSkillsList.innerHTML =
    "<li>Please paste a Job Description to see matched skills.</li>";

}
const missingSkillsList =
document.getElementById("missingSkillsList");

missingSkillsList.innerHTML = "";

if(result.missingSkills &&
   result.missingSkills.length > 0){

    result.missingSkills.forEach(skill => {

        missingSkillsList.innerHTML +=
        `<li>${skill}</li>`;

    });

}
else{

    missingSkillsList.innerHTML =
    "<li>No Missing Skills 🎉</li>";

}

}  // <-- ONLY ONE closing brace here
else{
    alert("No analysis data found. Please upload resume again.");
}
</script>

</body>
